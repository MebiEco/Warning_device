<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Device Setup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#e8edf5 0%,#d5dde8 50%,#c3cfe2 100%);min-height:100vh;padding:20px 10px 40px;
display:flex;flex-direction:column;align-items:center}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;font-weight:700;color:#3b82f6;letter-spacing:-.5px}
.header p{font-size:13px;color:#6b7280;margin-top:4px}
.card{background:#fff;border-radius:16px;padding:24px 20px;margin-bottom:18px;width:100%;max-width:420px;
box-shadow:0 4px 24px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04)}
.card-title{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;color:#1e293b;margin-bottom:18px}
.card-title .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.icon-wifi{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff}
.icon-azure{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff}
.icon-bt{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff}
label{display:block;font-size:12px;font-weight:500;color:#6b7280;margin-bottom:5px;margin-top:14px}
label:first-of-type{margin-top:0}
input,select{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;
color:#1e293b;background:#f8fafc;transition:border .2s,box-shadow .2s;outline:none}
input:focus,select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:40px}
.pass-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#94a3b8;padding:4px}
.btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{flex:1;min-width:100px;padding:11px 16px;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;
cursor:pointer;transition:transform .15s,box-shadow .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-red{background:linear-gradient(135deg,#ef4444,#f87171);color:#fff;box-shadow:0 3px 12px rgba(239,68,68,.25)}
.btn-green{background:linear-gradient(135deg,#10b981,#34d399);color:#fff;box-shadow:0 3px 12px rgba(16,185,129,.25)}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;box-shadow:0 3px 12px rgba(59,130,246,.25)}
.btn-full{flex:none;width:100%}
.status-msg{text-align:center;font-size:13px;margin-top:12px;min-height:18px;color:#10b981;font-weight:500;
animation:fadeIn .3s}
.status-err{color:#ef4444}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
#btDeviceList{list-style:none;padding:0;margin-top:14px}
#btDeviceList li{padding:12px 14px;border-radius:10px;margin:6px 0;background:#f8fafc;border:1px solid #e2e8f0;
display:flex;justify-content:space-between;align-items:center;transition:background .2s}
#btDeviceList li:hover{background:#eef2ff}
#btDeviceList li .dev-name{font-weight:600;color:#1e293b;font-size:14px}
#btDeviceList li .dev-mac{font-size:11px;color:#94a3b8;margin-top:2px}
#btDeviceList li button{padding:7px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,#10b981,#34d399);
color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:transform .15s}
#btDeviceList li button:active{transform:scale(.95)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;
border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <h1>&#9881; Device Setup</h1>
  <p>Configure connectivity parameters</p>
</div>

<!-- ═══════════ WIFI SECTION ═══════════ -->
<div class="card">
  <div class="card-title"><div class="icon icon-wifi">&#128246;</div> WiFi Configuration</div>
  <label for="wifiSelect">Available Networks</label>
  <select id="wifiSelect" onchange="document.getElementById('wifiHidden').value=this.value"><option>Mebieco</option><option>Viettel 0978565965</option><option>TP-Link_5G</option></select>

  <label for="wifiHidden">Hidden SSID (Optional)</label>
  <input id="wifiHidden" placeholder="Enter SSID manually" value="Mebieco">

  <label for="wifiPass">Password</label>
  <div class="pass-wrap">
    <input id="wifiPass" type="password" placeholder="WiFi password" value="68686868">
    <button class="pass-toggle" onclick="var p=document.getElementById('wifiPass');p.type=p.type==='password'?'text':'password';this.innerHTML=p.type==='password'?'&#128065;':'&#128064;'">&#128065;</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-red" onclick="clearWifi()">Clear WiFi</button>
    <button class="btn btn-green" onclick="saveWifi()">Save &amp; Reconnect</button>
  </div>
  <button class="btn btn-blue btn-full" style="margin-top:10px" id="scanWifiBtn" onclick="scanWifi()">Scan Networks</button>
  <div id="wifiStatus" class="status-msg"></div>
</div>

<!-- ═══════════ AZURE SECTION ═══════════ -->
<div class="card">
  <div class="card-title"><div class="icon icon-azure">&#9729;</div> Azure IoT Hub</div>
  <label for="azureHost">Host Name</label>
  <input id="azureHost" placeholder="your-hub.azure-devices.net" value="dev-iot-hub-1.azure-devices.net">

  <label for="azureDevId">Device ID</label>
  <input id="azureDevId" placeholder="my-device-1" value="test-devices-1">

  <label for="azureKey">Symmetric Key</label>
  <input id="azureKey" placeholder="Base64 symmetric key" value="5UQFalxedSORhesnVEP2FlOehjEA73N+e2jUEc9ewY=">

  <div class="btn-row">
    <button class="btn btn-red" onclick="clearAzure()">Clear Azure</button>
    <button class="btn btn-green" onclick="saveAzure()">Save Azure Config</button>
  </div>
  <div id="azureStatus" class="status-msg"></div>
</div>

<!-- ═══════════ BLUETOOTH SECTION ═══════════ -->
<div class="card">
  <div class="card-title"><div class="icon icon-bt">&#127925;</div> Bluetooth Speaker</div>
  <button class="btn btn-blue btn-full" id="scanBtBtn" onclick="scanBt()">Scan Bluetooth Devices</button>
  <div id="btStatus" class="status-msg">Found 3 devices</div>
  <ul id="btDeviceList">
    <li><div><div class="dev-name">JBL Flip 5</div><div class="dev-mac">a4:77:33:1c:5b:2e</div></div><button>Connect</button></li>
    <li><div><div class="dev-name">Sony SRS-XB12</div><div class="dev-mac">00:18:09:3c:af:21</div></div><button>Connect</button></li>
    <li><div><div class="dev-name">Unknown Device</div><div class="dev-mac">fc:58:fa:a1:02:98</div></div><button>Connect</button></li>
  </ul>
</div>

<script>
/* ═══ DEMO mode - show messages without actual API ═══ */
function scanWifi(){
  var b=document.getElementById('scanWifiBtn');
  b.disabled=true;b.innerHTML='<span class="spinner"></span>Scanning...';
  setTimeout(function(){
    b.disabled=false;b.innerHTML='Scan Networks';
    document.getElementById('wifiStatus').className='status-msg';
    document.getElementById('wifiStatus').innerText='Found 3 networks';
  },2000);
}
function saveWifi(){
  var ssid=document.getElementById('wifiHidden').value||document.getElementById('wifiSelect').value;
  if(!ssid){document.getElementById('wifiStatus').className='status-msg status-err';document.getElementById('wifiStatus').innerText='Please select or enter SSID';return;}
  document.getElementById('wifiStatus').className='status-msg';
  document.getElementById('wifiStatus').innerText='Saved WiFi. Reconnecting...';
}
function clearWifi(){
  document.getElementById('wifiHidden').value='';
  document.getElementById('wifiPass').value='';
  document.getElementById('wifiStatus').className='status-msg';
  document.getElementById('wifiStatus').innerText='WiFi credentials cleared';
}
function saveAzure(){
  var h=document.getElementById('azureHost').value,d=document.getElementById('azureDevId').value,k=document.getElementById('azureKey').value;
  if(!h||!d||!k){document.getElementById('azureStatus').className='status-msg status-err';document.getElementById('azureStatus').innerText='All fields required';return;}
  document.getElementById('azureStatus').className='status-msg';
  document.getElementById('azureStatus').innerText='Saved azure successfully!';
}
function clearAzure(){
  document.getElementById('azureHost').value='';
  document.getElementById('azureDevId').value='';
  document.getElementById('azureKey').value='';
  document.getElementById('azureStatus').className='status-msg';
  document.getElementById('azureStatus').innerText='Azure credentials cleared';
}
function scanBt(){
  var b=document.getElementById('scanBtBtn');
  b.disabled=true;b.innerHTML='<span class="spinner"></span>Scanning... (~10s)';
  document.getElementById('btDeviceList').innerHTML='';
  document.getElementById('btStatus').innerText='';
  setTimeout(function(){
    b.disabled=false;b.innerHTML='Scan Bluetooth Devices';
    document.getElementById('btStatus').className='status-msg';
    document.getElementById('btStatus').innerText='Found 3 devices';
    var ul=document.getElementById('btDeviceList');
    var devices=[{name:'JBL Flip 5',mac:'a4:77:33:1c:5b:2e'},{name:'Sony SRS-XB12',mac:'00:18:09:3c:af:21'},{name:'Unknown Device',mac:'fc:58:fa:a1:02:98'}];
    devices.forEach(function(dev){
      var li=document.createElement('li');
      li.innerHTML='<div><div class="dev-name">'+dev.name+'</div><div class="dev-mac">'+dev.mac+'</div></div><button onclick="this.innerText=\'Connected!\'">Connect</button>';
      ul.appendChild(li);
    });
  },3000);
}
</script>
</body>
</html>
